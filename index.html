<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand — eCommerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ---------- HOME PAGE WEEK-1 PLACEHOLDER ---------- */
    .page-placeholder {
      min-height: 400px;
      background: linear-gradient(135deg, #e8f4fd 0%, #d0eaf7 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: #4a90b8;
    }
    .page-placeholder i { font-size: 48px; opacity: 0.35; }
    .page-placeholder h2 { font-size: 22px; font-weight: 600; }
    .page-placeholder p { font-size: 14px; color: #6aabcf; }
    .page-placeholder .week-badge {
      background: var(--blue); color: #fff;
      font-size: 13px; padding: 5px 16px;
      border-radius: 20px; margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- HEADER (injected by JS) -->
  <div id="site-header"></div>

  <!-- MAIN CONTENT placeholder (Week 2 will fill this) -->
  <main>
    <div class="page-placeholder">
      <i class="fa-solid fa-store"></i>
      <h2>Home Page</h2>
      <p>Hero section, categories, product cards &amp; more coming in Week 2</p>
      <span class="week-badge">Week 2 Deliverable</span>
    </div>
  </main>

  <!-- FOOTER (injected by JS) -->
  <div id="site-footer"></div>

  <!-- Scripts -->
  <script src="js/header-footer.js"></script>
</body>
</html>
